          - metric/ad-avoidance
          - trend/ad-blocking
          - metric/intrusiveness
          - metric/trust
      - slug: personalization
        label: "Personalización & Expectativas"
        keywords_example:
          - trend/personalization
          - metric/purchase-intent
          - trend/relevance
          - audience/consumer
      - slug: trust-influence
        label: "Confianza & Influencia"
        keywords_example:
          - trend/influencer-trust
          - trend/recommendations
          - trend/social-proof
          - metric/brand-trust
      - slug: sustainability
        label: "Sostenibilidad & Valores"
        keywords_example:
          - trend/sustainability
          - trend/conscious-consumption
          - metric/brand-loyalty
          - audience/gen-z
      - slug: media-consumption
