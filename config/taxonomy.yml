version: 2

slug_rules:
  - lowercase
  - hyphens_not_underscores
  - no_accents
  - singular_preferred

market_focus:
  core:
    - ooh
    - dooh
    - pdooh
    - digital-signage
    - programmatic
    - media-planning
    - omnichannel
    - adtech
    - martech
    - ai-advertising
    - retail-media
    - audience-measurement
    - dco
  context:
    - consumer-behavior
    - ctv
    - streaming
    - creative
    - data
    - automation
    - saas
    - market-research
  peripheral:
    - renewable-energy
    - blockchain
    - crypto
    - iot-industrial
    - cybersecurity
    - hybrid-cloud
    - generic-finance

keyword_types:
  company:   "Empresa o marca (jcdecaux, broadsign, netflix, nielsen)"
  platform:  "Plataforma o producto digital (vistar, viooh, google-ads, meta-ads)"
  channel:   "Canal de comunicación o distribución (ooh, dooh, pdooh, ctv, programmatic)"
  tech:      "Tecnología o infraestructura (dco, dsp, ssp, clean-room, ai-max, cookieless)"
  metric:    "KPI o métrica (brand-lift, ad-recall, footfall, roas, purchase-intent)"
  format:    "Formato de contenido o publicidad (carousel, video, dooh, anamorphic)"
  geo:       "Geografía o mercado (spain, latam, emea, brazil, mexico)"
  audience:  "Segmento o perfil (cmo, gen-z, shopper, advertiser, planner)"
  trend:     "Tendencia o movimiento (cookieless, retail-media, omnichannel, ai-first)"
  study:     "Estudio o informe (nielsen-report, iab-study, kantar-survey, oaaa-study)"
  index:     "Índice de mercado (adspend, consumer-confidence-index, cpi)"

primaries:

  - slug: media-advertising
    label: "Media & Advertising"
    description: "Ecosistema de medios y publicidad: Exterior (OOH/DOOH/pDOOH), CTV, programática, planificación y compra de medios"
    priority: true
    secondaries:
      - slug: ooh-dooh
        label: "OOH / DOOH / pDOOH"
        keywords_example:
          - channel/ooh
          - channel/dooh
          - channel/pdooh
          - format/digital-signage
          - company/jcdecaux
          - company/broadsign
          - company/clear-channel
          - metric/ad-recall
          - metric/footfall
      - slug: programmatic
        label: "Programática"
        keywords_example:
          - channel/programmatic
          - tech/dsp
          - tech/ssp
          - channel/pdooh
          - platform/vistar
          - platform/viooh
          - metric/cpm
      - slug: media-planning
        label: "Media Planning & Buying"
        keywords_example:
          - trend/cross-media
          - trend/omnichannel
          - metric/reach
          - metric/frequency
          - audience/planner
          - metric/grp
      - slug: streaming-ctv
        label: "Streaming & CTV"
        keywords_example:
          - channel/ctv
          - company/netflix
          - company/disney
          - trend/ad-tier
          - metric/avod
      - slug: social-platforms
        label: "Social & Digital Platforms"
        keywords_example:
          - platform/tiktok
          - platform/meta
          - platform/youtube
          - platform/linkedin
          - trend/short-video
      - slug: industry-news
        label: "Mercado Publicitario (agencias, campañas, premios)"
        keywords_example:
          - trend/agency-news
          - trend/account-move
          - trend/award
          - trend/campaign-launch
          - geo/spain
          - audience/cmo

  - slug: tech-innovation
    label: "Tech & Innovation"
    description: "Tecnología pura y aplicada a publicidad: IA, automatización, SaaS, adtech/martech, datos y privacidad"
    priority: true
    secondaries:
      - slug: ai-advertising
        label: "IA aplicada a publicidad"
        keywords_example:
          - tech/generative-ai
          - tech/ai-max
          - trend/ai-first
          - tech/dco
          - trend/ai-creative
          - company/openai
      - slug: automation-saas
        label: "Automatización & SaaS"
        keywords_example:
          - trend/automation
          - trend/no-code
          - trend/saas
          - trend/agentic-ai
          - tech/workflow-automation
      - slug: adtech
        label: "AdTech"
        keywords_example:
          - tech/dsp
          - tech/ssp
          - tech/header-bidding
          - company/the-trade-desk
          - channel/programmatic
      - slug: martech
        label: "MarTech"
        keywords_example:
          - tech/cdp
          - tech/crm
          - company/salesforce
          - company/adobe
          - trend/martech-stack
      - slug: data-privacy
        label: "Data & Privacy"
        keywords_example:
          - trend/cookieless
          - tech/clean-room
          - tech/identity-resolution
          - trend/first-party-data
          - tech/privacy-sandbox
      - slug: emerging-tech
        label: "Tecnología emergente (ángulo publicitario)"
        keywords_example:
          - tech/ar
          - tech/dco
          - tech/computer-vision
          - trend/spatial-computing
          - trend/digital-twins

  - slug: consumer-behavior
    label: "Consumer Behavior"
    description: "Comportamiento, percepción y expectativas del consumidor frente a marcas, medios y publicidad"
    secondaries:
