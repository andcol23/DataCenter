google_trends:
  keywords:
    - ["OOH advertising", "DOOH", "digital signage", "outdoor advertising"]
    - ["programmatic advertising", "ad tech", "RTB", "programmatic DOOH"]
    - ["CTV advertising", "connected TV", "streaming ads", "Netflix ads"]
    - ["AI advertising", "advertising automation", "generative AI marketing"]
    - ["consumer behavior Spain", "comportamiento consumidor", "retail trends"]
  geo: ES                      # Spain as primary market
  timeframe: "now 7-d"

gmail:
  label: "media-hub"           # Etiqueta que usarás en Gmail para marcar emails
  max_age_days: 7              # Solo procesar emails de los últimos N días

gdrive:
  folder_id: "1HzoDBQ0gVPf1kiUJrLYjY-gAtvVNLKcZ"
  supported_types:
    - "application/pdf"
    - "text/plain"

analysis:
  model: "gpt-4o-mini"
  embedding_model: "text-embedding-3-small"
  min_relevance_threshold: 0.55    # Items con score menor se archivan
  max_tokens_analysis: 1500
  language: "es"               # Idioma de salida de los análisis

linkedin:
  default_format: "single_post"
  hashtags_max: 5
  post_max_chars: 3000
  carousel_slides_max: 10
